# robot_platform_pkg/config/gimbal_params.yaml
# DJI RS2 云台参数
gimbal_driver:
  ros__parameters:
    autostart: true           # true = 进程启动后自动 configure + activate；false = 手动 ros2 lifecycle set
    use_sim: false            # true = 仿真模式，无需 CAN 硬件
    can_interface: "can0"     # CAN 接口名称（Linux SocketCAN 接口）
    # DJI RS2 R SDK over CAN 使用固定标准帧 ID：
    #   host -> gimbal: 0x223
    #   gimbal -> host: 0x222
    # 这两个 ID 在 dji_rs2_protocol.hpp 中定义，不作为运行时参数配置。
    enable_command_timeout: true
    command_timeout_sec: 0.5
    max_yaw_rate: 1.0        # 驱动层最终限幅，单位 rad/s
    max_pitch_rate: 1.0      # 驱动层最终限幅，单位 rad/s
    status_publish_rate_hz: 10.0
    stop_command_burst_count: 3
    control_mode: "incremental_position"  # 将 rate 积分为绝对目标，使用 RS2 已验证的绝对位置帧执行
    # DJI速度控制字。参考RS2控制器使用0x80；保留为参数便于真机回退对比。
    speed_control_byte: 128
    incremental_position_duration_sec: 0.1    # 每个位置目标指令的执行时间，最小 0.1s
    incremental_position_max_step_deg: 2.0    # 单次增量最大角度，防止低频/卡顿时跳变过大
    # 首次点按按100ms固定步长换算，避免单个20ms采样小到落入机械死区。
    incremental_position_default_dt_sec: 0.1
    incremental_position_max_dt_sec: 0.1      # rate→delta 时允许使用的最大周期
    # RS2单个位置动作最少100ms，因此CAN目标最多10Hz，避免50Hz覆盖导致抖动。
    incremental_position_send_period_sec: 0.1
    debug_position_yaw_deg: 5.0       # /gimbal/debug_position 的绝对 yaw 目标角，单位 deg
    debug_position_pitch_deg: 0.0     # /gimbal/debug_position 的绝对 pitch 目标角，单位 deg
    debug_position_duration_sec: 0.5  # /gimbal/debug_position 的运动时间，单位 s
