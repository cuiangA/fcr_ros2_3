# servo_control_pkg/config/ibvs_params.yaml
# IBVS（基于图像的视觉伺服）控制器参数
servo_manager:
  ros__parameters:
    lambda_gain: 1.2              # 基础控制增益 λ（↑ → 整体响应更快）
    gain_max: 1.8                 # 自适应增益最大值
    gain_min: 0.4                 # 自适应增益最小值（↑ → 小误差不减速）
    error_threshold_slow: 0.05    # 误差阈值（低于此值时使用较低增益，避免超调）
    svd_damping: 0.01             # 阻尼伪逆系数，抑制交互矩阵接近奇异时的速度突变
    use_adaptive_gain: true       # 是否启用自适应增益
    max_linear_velocity: 1.0      # 最大线速度 (m/s)
    max_angular_velocity: 2.0     # 最大角速度 (rad/s)
    feature_tolerance: 0.01       # 特征误差收敛阈值（小于此值视为已收敛）
    desired_depth: 2.0            # 期望目标深度 (m)
