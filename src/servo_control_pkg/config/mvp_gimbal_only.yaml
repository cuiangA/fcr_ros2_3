mvp_follow_controller_node:
  ros__parameters:
    target_topic: /perception/tracks
    platform_state_topic: /platform/state
    camera_info_topic: /sony/camera_info
    cmd_vel_topic: /auto/cmd_vel
    cmd_gimbal_topic: /auto/cmd_gimbal
    use_twist_stamped: true

    enable_gimbal_tracking: true
    enable_base_yaw: false
    enable_base_translation: false
    use_mock_gimbal_state: false
    require_camera_info: true
    center_reference: image_center

    image_width: 1024
    image_height: 680
    control_rate_hz: 50.0

    use_ibvs_gimbal: false
    K_gimbal_x: 0.25
    K_gimbal_y: 0.18
    # Real RS2/can1 calibration: a target on the image right must command +yaw.
    yaw_sign: 1.0
    pitch_sign: -1.0
    ex_deadband: 0.05
    ey_deadband: 0.06
    max_gimbal_yaw_vel: 0.10
    max_gimbal_pitch_vel: 0.08

    K_base_z: 0.0
    K_base_yaw: 0.0
    max_base_vx: 0.0
    max_base_wz: 0.0

    filter_alpha_error: 0.25
    filter_alpha_depth: 0.20
    filter_alpha_cmd: 0.20
    target_timeout: 0.25
    aim_target_topic: /perception/aim_target_2d
    aim_target_timeout: 0.25

    min_depth_confidence: 0.60
    min_valid_depth: 0.30
    max_valid_depth: 10.0
