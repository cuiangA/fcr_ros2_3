detection_node:
  ros__parameters:
    # perception.launch.py resolves the packaged model to an absolute path.
    # Keep this empty so the same YAML works in source, install and Jetson layouts.
    model_path: ""
    model_type: "yolov8"            # yolov8, yolov5, or auto
    labels_path: ""                 # Empty uses built-in COCO labels
    device: "cpu"                   # cpu, cuda_fp16, cuda_fp32, or tensorrt
    input_width: 640
    input_height: 640
    max_detections: 100
    warmup_runs: 1
    confidence_threshold: 0.5
    nms_threshold: 0.45
    performance_log_period: 5.0      # seconds; 0 disables periodic statistics
    input_timeout_seconds: 2.0       # warn on /sony/image_raw silence
    swap_rb: true
    class_names: ["person"]          # Empty list enables every model class
    camera_frame: ""                 # Empty preserves the Sony image frame_id
    publish_debug_image: true
    fail_on_model_error: true
